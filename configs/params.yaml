# Parâmetros do pipeline DVC (dvc.yaml), agrupados por stage.
# A semente aleatória é única e vem de `Configuracoes` (.env), não é duplicada aqui.
# Valores alinhados ao notebook de referência (models/recomendacao_movielens.ipynb),
# para que o pipeline reproduza o mesmo modelo/dataset/split/hiperparâmetros.

preprocessamento:
  # ml-latest-small (mesmo dataset do notebook) já é pequeno o bastante para não precisar
  # de amostragem. `null` usa o dataset completo (100.836 avaliações).
  tamanho_amostra: null
  min_avaliacoes_por_usuario: 1
  min_avaliacoes_por_filme: 1

engenharia_features:
  # Split temporal por usuário: os 15% finais de cada usuário viram teste, os 15%
  # anteriores a esses viram validação (early stopping), o resto vira treino.
  fracao_validacao: 0.15
  fracao_teste: 0.15

treino:
  tipo_modelo: rede_neural
  dimensao_embedding: 32
  camadas_ocultas: [64, 32, 16]
  dropout: 0.2
  taxa_aprendizado: 0.001
  decaimento_peso: 0.00001
  epocas: 40
  paciencia: 4
  tamanho_lote: 1024

avaliacao:
  # Rating >= 4.0 conta como "relevante" para as métricas de ranking (Precision/Recall/NDCG).
  relevancia_minima: 4.0
  top_k: 10
